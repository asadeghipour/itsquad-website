<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <!-- Background -->
  <rect width="600" height="400" fill="#f0f4f8"/>
  
  <!-- Home location 1 - Top Left -->
  <g transform="translate(80, 80)">
    <!-- House -->
    <polygon points="0,40 40,0 80,40" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <rect x="0" y="40" width="80" height="60" fill="#d4753e" stroke="#c0392b" stroke-width="2"/>
    <!-- Door -->
    <rect x="30" y="60" width="20" height="40" fill="#8b4513" stroke="#5c2f0c" stroke-width="1"/>
    <!-- Window with laptop -->
    <rect x="50" y="50" width="20" height="20" fill="#87ceeb"/>
    <text x="60" y="63" font-size="14" text-anchor="middle" fill="#2c3e50">💻</text>
  </g>
  
  <!-- Office location 2 - Top Right -->
  <g transform="translate(440, 80)">
    <!-- Building -->
    <rect x="0" y="20" width="80" height="80" fill="#34495e" stroke="#2c3e50" stroke-width="2"/>
    <!-- Windows -->
    <rect x="10" y="30" width="15" height="15" fill="#87ceeb" stroke="#2c3e50" stroke-width="1"/>
    <rect x="30" y="30" width="15" height="15" fill="#87ceeb" stroke="#2c3e50" stroke-width="1"/>
    <rect x="55" y="30" width="15" height="15" fill="#87ceeb" stroke="#2c3e50" stroke-width="1"/>
    <!-- Door -->
    <rect x="35" y="75" width="10" height="25" fill="#8b4513"/>
  </g>
  
  <!-- Coffee shop - Bottom Left -->
  <g transform="translate(150, 250)">
    <rect x="0" y="0" width="70" height="60" fill="#cd853f" stroke="#8b4513" stroke-width="2" rx="3"/>
    <circle cx="15" cy="15" r="8" fill="#8b4513"/>
    <text x="15" y="18" font-size="10" text-anchor="middle" fill="#fff">☕</text>
    <rect x="35" y="5" width="25" height="20" fill="#87ceeb"/>
  </g>
  
  <!-- Cloud sync center -->
  <circle cx="300" cy="180" r="50" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="300" y="190" font-size="30" text-anchor="middle" fill="white">☁️</text>
  
  <!-- Connection lines -->
  <path d="M 120 140 Q 200 160 250 160" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5"/>
  <path d="M 480 160 Q 400 160 350 160" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5"/>
  <path d="M 190 250 Q 240 220 260 180" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Security lock indicators -->
  <circle cx="105" cy="210" r="6" fill="#27ae60" stroke="#229954" stroke-width="1"/>
  <text x="105" y="214" font-size="8" fill="white" text-anchor="middle">🔒</text>
  
  <circle cx="495" cy="210" r="6" fill="#27ae60" stroke="#229954" stroke-width="1"/>
  <text x="495" y="214" font-size="8" fill="white" text-anchor="middle">🔒</text>
  
  <!-- Label -->
  <text x="300" y="370" font-size="18" font-weight="bold" fill="#2c3e50" text-anchor="middle">Secure Remote Work Solutions</text>
</svg>
