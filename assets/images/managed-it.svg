<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <!-- Background -->
  <rect width="600" height="400" fill="#f0f4f8"/>
  
  <!-- Desktop Computer -->
  <rect x="150" y="100" width="300" height="200" rx="10" fill="#2c3e50" stroke="#34495e" stroke-width="2"/>
  <rect x="160" y="110" width="280" height="180" fill="#ecf0f1"/>
  
  <!-- Screen content lines -->
  <rect x="170" y="120" width="260" height="20" fill="#3498db" rx="3"/>
  <rect x="170" y="150" width="260" height="12" fill="#95a5a6" rx="2"/>
  <rect x="170" y="170" width="260" height="12" fill="#95a5a6" rx="2"/>
  <rect x="170" y="190" width="200" height="12" fill="#95a5a6" rx="2"/>
  
  <!-- Monitor stand -->
  <polygon points="200,300 400,300 380,320 220,320" fill="#2c3e50" stroke="#1a252f" stroke-width="1"/>
  
  <!-- Status indicator - Green dot -->
  <circle cx="570" cy="130" r="15" fill="#27ae60"/>
  <text x="570" y="135" font-size="8" fill="white" text-anchor="middle" font-weight="bold">●</text>
  
  <!-- Support icon - Checkmarks -->
  <g transform="translate(50, 320)">
    <circle cx="10" cy="10" r="8" fill="#27ae60"/>
    <polyline points="4,10 8,14 16,6" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <g transform="translate(500, 320)">
    <circle cx="10" cy="10" r="8" fill="#27ae60"/>
    <polyline points="4,10 8,14 16,6" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Label -->
  <text x="300" y="370" font-size="18" font-weight="bold" fill="#2c3e50" text-anchor="middle">Managed IT Support</text>
</svg>
